# ComfyUI 技能配置文件
# 复制此文件为 config.yml 并修改配置

# ComfyUI 服务器配置
server:
  url: "http://localhost:8188"  # ComfyUI 服务器地址
  timeout: 300                  # 超时时间（秒）

# 默认生成参数
defaults:
  checkpoint: null              # null 表示自动检测第一个可用模型
  width: 512                    # 默认宽度
  height: 512                   # 默认高度
  steps: 20                     # 默认步数
  cfg: 7.0                      # 默认 CFG 缩放
  sampler: "euler_a"            # 默认采样器
  negative_prompt: "lowres, bad anatomy, worst quality, low quality"

# 输出配置
output:
  dir: "./comfyui-output"       # 输出目录
  auto_download: true           # 是否自动下载结果
  preview: "feh"                # 预览方式：feh | xdg-open | open | auto | none

# 工作流配置
workflows:
  search_path:
    - "./.agents/skills/comfyui/workflows"  # 项目级
    - "~/.agents/skills/comfyui/workflows"  # 全局级
