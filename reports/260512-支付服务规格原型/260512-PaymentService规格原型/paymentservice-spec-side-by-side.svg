<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">PaymentService spec artifact prototype: Markdown and HTML versions side by side</title>
  <desc id="desc">A high-level side-by-side mockup showing a Markdown skeleton on the left and a rendered HTML spec on the right.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="55%" stop-color="#172033"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity=".35"/>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <text x="64" y="72" fill="#f8fafc" font-family="Georgia, serif" font-size="34" font-weight="700">
    PaymentService Spec Artifact
  </text>
  <text x="64" y="104" fill="#94a3b8" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14">
    prototype comparison: raw Markdown skeleton vs rendered HTML artifact
  </text>

  <g filter="url(#shadow)">
    <rect x="64" y="140" width="548" height="500" rx="24" fill="#0b1020" stroke="#334155"/>
    <rect x="64" y="140" width="548" height="54" rx="24" fill="#111827"/>
    <circle cx="94" cy="167" r="7" fill="#ef4444"/>
    <circle cx="118" cy="167" r="7" fill="#f59e0b"/>
    <circle cx="142" cy="167" r="7" fill="#22c55e"/>
    <text x="172" y="173" fill="#cbd5e1" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15">
      payment-service.md
    </text>

    <text x="92" y="232" fill="#e2e8f0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" font-weight="700">
      # PaymentService Spec
    </text>
    <rect x="92" y="258" width="210" height="10" rx="5" fill="#334155"/>
    <rect x="92" y="280" width="390" height="10" rx="5" fill="#273449"/>
    <rect x="92" y="302" width="320" height="10" rx="5" fill="#273449"/>

    <text x="92" y="358" fill="#93c5fd" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" font-weight="700">
      ## Scope
    </text>
    <rect x="92" y="382" width="450" height="10" rx="5" fill="#243044"/>
    <rect x="92" y="404" width="365" height="10" rx="5" fill="#243044"/>
    <rect x="92" y="426" width="250" height="10" rx="5" fill="#243044"/>

    <text x="92" y="482" fill="#93c5fd" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" font-weight="700">
      ## API / Behavior
    </text>
    <rect x="112" y="506" width="160" height="10" rx="5" fill="#475569"/>
    <rect x="112" y="528" width="300" height="10" rx="5" fill="#243044"/>
    <rect x="112" y="550" width="418" height="10" rx="5" fill="#243044"/>
    <rect x="112" y="572" width="220" height="10" rx="5" fill="#243044"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="668" y="140" width="548" height="500" rx="24" fill="#f8fafc" stroke="#dbeafe"/>
    <rect x="700" y="176" width="92" height="24" rx="12" fill="#dbeafe"/>
    <text x="720" y="193" fill="#1d4ed8" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="700">
      DRAFT
    </text>
    <text x="700" y="238" fill="#0f172a" font-family="Georgia, serif" font-size="31" font-weight="700">
      PaymentService Spec
    </text>
    <text x="700" y="266" fill="#64748b" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14">
      Defines payment authorization, capture, refund, and settlement behavior.
    </text>

    <rect x="700" y="302" width="484" height="70" rx="16" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="724" y="330" fill="#1e3a8a" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700">
      Goal
    </text>
    <text x="724" y="354" fill="#334155" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14">
      Provide a reliable boundary for payment lifecycle operations.
    </text>

    <text x="700" y="414" fill="#0f172a" font-family="ui-sans-serif, system-ui, sans-serif" font-size="17" font-weight="800">
      Core API Surface
    </text>
    <rect x="700" y="436" width="484" height="44" rx="10" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="724" y="464" fill="#0f766e" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="700">
      authorize()
    </text>
    <text x="856" y="464" fill="#64748b" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13">
      reserves funds and returns authorization state
    </text>

    <rect x="700" y="492" width="484" height="44" rx="10" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="724" y="520" fill="#0f766e" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="700">
      capture()
    </text>
    <text x="856" y="520" fill="#64748b" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13">
      settles a prior authorization
    </text>

    <rect x="700" y="548" width="484" height="44" rx="10" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="724" y="576" fill="#0f766e" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="700">
      refund()
    </text>
    <text x="856" y="576" fill="#64748b" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13">
      reverses captured funds with audit trail
    </text>
  </g>
</svg>
